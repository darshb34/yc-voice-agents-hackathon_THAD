# Cekura eval configuration — Tetris Nutrition Coach
#
# Single source of truth for the automated testing pipeline (evals/run.py, report.py).
# The product agent is now Albert's nutrition coach (merged from origin/albert), NOT
# the flower shop. The flower agent (18027) + its scenarios still exist in Cekura but
# are deprecated.
#
# Connection: the coach is deployed on Pipecat Cloud as agent "flower-bot" (name kept
# from the original deploy target; the running code is the coach). Cekura starts
# Daily/WebRTC sessions via scenarios_run_pipecat_v2.

cekura:
  organization_id: 4664        # TetrisNutrition
  project_id: 5636             # "HG Z Project"
  agent_id: 18069              # "Tetris Nutrition Coach"  (flower agent was 18027, deprecated)
  personality_id: 693          # Normal Male (en)
  folder: "Coach - new member intake"
  dashboard_result_url: "https://dashboard.cekura.ai/{project_id}/results/{result_id}?call_id={run_id}"

pipecat_cloud:
  org: "legitimate-otter-copper-485"
  agent_name: "flower-bot"     # coach is deployed here; rename later if desired
  secret_set: "flower-bot-secrets"

run:
  mode: pipecat_v2
  frequency: 1
  concurrency: 3               # Pipecat max_agents cap; >this fails with concurrency-limit
  poll_interval_secs: 20
  timeout_secs: 1800

# Prompt-optimization target (Phase 4b): the coach persona lives in
# server/coach_prompt.py::build_system_instruction — Albert designed it so an
# improvement harness edits THAT file and nothing else. optimize_prompt.py will be
# re-pointed from the flower prompt .txt to coach_prompt.py when we run the loop.
prompt_source: "server/coach_prompt.py::build_system_instruction"

# The 11 project-level predefined metrics (cover task success, tool-calling,
# conversational quality, STT/transcription, latency). They did NOT auto-attach to
# the new agent, so they're attached to each scenario explicitly by ID.
metrics:
  task_success:
    - { id: 144349, name: "Expected Outcome",        affects_success: true }
    - { id: 144350, name: "Infrastructure Issues",   affects_success: true }
  tool_calling:
    - { id: 144355, name: "Tool Call Success",       affects_success: true }
  conversational_quality:
    - { id: 144351, name: "Interruption Score" }
    - { id: 144347, name: "AI interrupting user" }
    - { id: 144353, name: "Stop Time after User Interruption (ms)" }
    - { id: 144354, name: "Talk Ratio" }
    - { id: 144357, name: "Unnecessary Repetition Score" }
  stt_accuracy:
    - { id: 144356, name: "Transcription Accuracy" }
  performance:
    - { id: 144352, name: "Latency (in ms)" }
    - { id: 144348, name: "Average Pitch (in Hz)" }

# Skeleton scenarios (more to come from detailed specs). Returning-member flows are
# intentionally omitted: Cekura can't match a caller ID to KNOWN_MEMBERS, so those
# can't be exercised here — keep scenarios to new-member / anonymous flows.
scenarios:
  intake:
    - { id: 273074, name: "New member intake → first meal rec (happy path)" }
